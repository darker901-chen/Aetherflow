<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AetherFlow Password Field Fixture</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      color: #111;
      background: #f7f7f7;
    }

    main {
      width: 720px;
      padding: 24px;
      background: #fff;
      border: 1px solid #ccc;
    }

    label {
      display: block;
      margin: 20px 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    input {
      width: 560px;
      padding: 12px;
      font-size: 28px;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <main>
    <h1>AetherFlow Password Mask Test</h1>
    <p>Keep this browser window in the foreground while AetherFlow runs.</p>

    <label for="password-field">Password</label>
    <input id="password-field" type="password" value="fixture-secret" autofocus>

    <p>The correct output video shows a black rectangle over the password field only.</p>
  </main>
</body>
</html>
